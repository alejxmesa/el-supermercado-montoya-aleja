<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercados Montoya - Panel de Usuario</title>
    <link rel="stylesheet" href="styles/css/bootstrap.min.css">
    <style>
        .container {
            margin-top: 20px;
        }
        .welcome-message {
            font-size: 1.5em;
            color: #28a745; /* Otro color verde */
            margin-bottom: 20px;
        }
        .admin-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #ffc107; /* Un color amarillo para administración */
            color: #333;
            text-decoration: none;
            border-radius: 5px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .sales-info {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">Supermercados Montoya - Admin</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item active">
                    <a class="nav-link" href="#">Inicio <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="lista_productos.html">Ver Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="formulario_producto.html">Agregar Producto</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 class="welcome-message">¡Hola, [Nombre del Usuario]!</h1>
        <p>¿Qué deseas hacer hoy?</p>
        <a href="lista_productos.html" class="admin-button">Ver Productos</a>
        <a href="formulario_producto.html" class="admin-button">Agregar Nuevo Producto</a>
        <a href="#" class="admin-button">Editar Productos</a>
        <a href="#" class="admin-button">Ver Inventario</a>

        <div class="sales-info">
            <h2>Información de Ventas</h2>
            <p>Ventas del día: [Cantidad]</p>
            <p>Nuevos pedidos: [Número]</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
